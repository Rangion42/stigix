# SD-WAN Traffic Generator - All-in-One Deployment (Bridge Mode)
# Used automatically on macOS and Windows/WSL by the install.sh script.
# Ports are explicitly mapped instead of using network_mode: host.
#
# ┌─ BRIDGE vs HOST MODE ─────────────────────────────────────────────────────┐
# │  Most features work identically in bridge mode:                            │
# │    ✅ Traffic generation (HTTP/HTTPS to internet)                          │
# │    ✅ Security tests (URL, DNS, EICAR, C2, AI)                             │
# │    ✅ Failover monitoring tests to external IPs (via NAT)                  │
# │    ✅ Voice RTP simulation to external targets (via NAT)                   │
# │    ✅ VyOS control, probes, dashboard, MCP                                 │
# │                                                                             │
# │  Limitations vs host mode (Linux recommendation):                          │
# │    ⚠️  IoT DHCP/ARP: devices are confined to the Docker bridge network     │
# │        and will NOT appear on the physical LAN as real Layer-2 entities.   │
# │        The IoT dashboard and simulation state tracking still work.         │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   docker compose -f docker-compose.bridge.yml up -d


services:
  stigix:
    image: jsuzanne/stigix:stable
    container_name: stigix
    # Bridge mode: required on macOS / Windows (host mode not supported)
    ports:
      - "8080:8080"      # Web Dashboard
      - "8082:8082"      # HTTP Echo Target
      - "9000:9000"      # XFR Bandwidth Target
      - "5201:5201/tcp"  # iPerf TCP
      - "5201:5201/udp"  # iPerf UDP
      - "6100:6100/udp"  # Voice RTP
      - "6101:6101/udp"  # Voice RTP (secondary)
      - "6200:6200/udp"  # Failover probes
      - "3100:3100"      # MCP Server
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    # Volumes for persistence
    volumes:
      - ./config:/app/config
      - ./logs:/var/log/sdwan-traffic-gen
      - ./mcp-data:/app/mcp-data
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # --- General & Web UI ---
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-your-secure-secret-here}
      - DEBUG=${DEBUG:-false}

      # --- Prisma SD-WAN API Credentials ---
      - PRISMA_SDWAN_REGION=${PRISMA_SDWAN_REGION:-}
      - PRISMA_SDWAN_TSGID=${PRISMA_SDWAN_TSGID:-}
      - PRISMA_SDWAN_CLIENT_ID=${PRISMA_SDWAN_CLIENT_ID:-}
      - PRISMA_SDWAN_CLIENT_SECRET=${PRISMA_SDWAN_CLIENT_SECRET:-}

      # --- Traffic Generator Settings ---
      - AUTO_START_TRAFFIC=${AUTO_START_TRAFFIC:-true}
      - SLEEP_BETWEEN_REQUESTS=${SLEEP_BETWEEN_REQUESTS:-1}
      - CLIENT_ID=${CLIENT_ID:-client01}

      # --- XFR Bandwidth Target ---
      - XFR_PORT=${XFR_PORT:-9000}
      - XFR_MAX_DURATION=${XFR_MAX_DURATION:-3600}
      - XFR_RATE_LIMIT=${XFR_RATE_LIMIT:-2}
      - XFR_ALLOW_CIDR=${XFR_ALLOW_CIDR:-0.0.0.0/0}

      # --- Target Ports ---
      - TARGET_HTTP_PORT=8082

      # --- Registry & Discovery (Optional Overrides) ---
      - STIGIX_REGISTRY_ENABLED=${STIGIX_REGISTRY_ENABLED:-true}
      - STIGIX_SITE_NAME=${STIGIX_SITE_NAME:-}
      - STIGIX_INSTANCE_ID=${STIGIX_INSTANCE_ID:-}
      - STIGIX_REGISTRY_HEARTBEAT_SEC=${STIGIX_REGISTRY_HEARTBEAT_SEC:-300}
      - STIGIX_REGISTRY_DISCOVERY_SEC=${STIGIX_REGISTRY_DISCOVERY_SEC:-120}
      - STIGIX_REGISTRY_MODE=${STIGIX_REGISTRY_MODE:-peer}
      # --- Stigix Cloud & Probes ---
      - STIGIX_REGISTRY_URL=${STIGIX_REGISTRY_URL:-https://registry.stigix.io}
      - STIGIX_TARGET_BASE_URL=${STIGIX_TARGET_BASE_URL:-https://target.stigix.io}
      - STIGIX_TARGET_MASTER_KEY=${STIGIX_TARGET_MASTER_KEY:-}

    healthcheck:
      test: [ "CMD-SHELL", "test -f /app/config/applications-config.json -o -f /app/config/applications.txt" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
